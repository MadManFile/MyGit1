name: ⬇️ Step 2 - Smart Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک یوتیوب'
        required: true
        type: string
      quality_mode:
        description: '🎯 حالت کیفیت'
        required: true
        default: '720p-safe'
        type: choice
        options:
          - minimal (حداقل کیفیت - کمترین حجم)
          - medium (کیفیت متوسط - 480p)
          - hd-safe (720p - پیشنهادی برای گیت‌هاب)
          - hd-1080 (1080p - با تایید حجم)
          - ultra (بالاترین کیفیت موجود - با احتیاط)
          - audio-only (فقط صوت MP3)
      confirm_high_quality:
        description: '⚠️ برای کیفیت 1080p یا بالاتر، تایید کنید (yes/no)'
        required: false
        default: 'no'
        type: string

jobs:
  smart-download:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Install yt-dlp & ffmpeg
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          yt-dlp --version
      
      - name: 🎯 Set format based on quality mode
        id: set_format
        run: |
          MODE="${{ github.event.inputs.quality_mode }}"
          CONFIRM="${{ github.event.inputs.confirm_high_quality }}"
          
          case "$MODE" in
            "minimal (حداقل کیفیت - کمترین حجم)")
              FORMAT="worstvideo+worstaudio/worst"
              QUALITY_NAME="حداقل کیفیت"
              ;;
            "medium (کیفیت متوسط - 480p)")
              FORMAT="bestvideo[height<=480]+bestaudio/best"
              QUALITY_NAME="480p (متوسط)"
              ;;
            "hd-safe (720p - پیشنهادی برای گیت‌هاب)")
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              QUALITY_NAME="720p (HD - ایمن برای گیت‌هاب)"
              ;;
            "hd-1080 (1080p - با تایید حجم)")
              if [ "$CONFIRM" != "yes" ]; then
                echo "❌ برای دانلود 1080p باید تایید کنید: confirm_high_quality=yes"
                exit 1
              fi
              FORMAT="bestvideo[height<=1080]+bestaudio/best"
              QUALITY_NAME="1080p (Full HD - نیاز به بررسی حجم)"
              ;;
            "ultra (بالاترین کیفیت موجود - با احتیاط)")
              if [ "$CONFIRM" != "yes" ]; then
                echo "❌ برای دانلود بالاترین کیفیت باید تایید کنید: confirm_high_quality=yes"
                exit 1
              fi
              FORMAT="bestvideo+bestaudio/best"
              QUALITY_NAME="بالاترین کیفیت موجود (احتمالاً بیشتر از 2GB)"
              ;;
            "audio-only (فقط صوت MP3)")
              FORMAT="bestaudio/best"
              QUALITY_NAME="فقط صوت (MP3)"
              ;;
            *)
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              QUALITY_NAME="720p (پیش‌فرض)"
              ;;
          esac
          
          echo "FORMAT=$FORMAT" >> $GITHUB_ENV
          echo "QUALITY_NAME=$QUALITY_NAME" >> $GITHUB_ENV
          echo "🎯 کیفیت انتخاب شده: $QUALITY_NAME"
          echo "🔧 فرمت: $FORMAT"
      
      - name: 📊 Check file size before download (for high quality)
        if: contains(github.event.inputs.quality_mode, '1080') || contains(github.event.inputs.quality_mode, 'ultra')
        run: |
          echo "🔍 در حال بررسی حجم تقریبی ویدیو..."
          
          # دریافت اطلاعات ویدیو
          yt-dlp -J "${{ github.event.inputs.url }}" > video_info.json
          
          # استخراج حجم تقریبی
          FILESIZE=$(jq -r '.filesize_approx // .filesize // 0' video_info.json 2>/dev/null || echo "0")
          FILESIZE_GB=$(echo "scale=2; $FILESIZE / 1024 / 1024 / 1024" | bc 2>/dev/null || echo "0")
          
          echo "📊 حجم تقریبی: ${FILESIZE_GB} GB"
          echo "FILESIZE_GB=$FILESIZE_GB" >> $GITHUB_ENV
          
          if (( $(echo "$FILESIZE_GB > 2" | bc -l) )); then
            echo "⚠️ هشدار: حجم فایل از 2GB بیشتر است!"
            echo "گیت‌هاب نمی‌تواند فایل‌های بزرگتر از 2GB را آپلود کند."
            echo "آیا مطمئن هستید؟ (برای ادامه به confirm_high_quality=yes نیاز است)"
          fi
      
      - name: ⬇️ Download video
        id: download
        run: |
          mkdir -p download
          
          echo "⬇️ شروع دانلود..."
          echo "🎯 کیفیت: ${{ env.QUALITY_NAME }}"
          
          if [ "${{ github.event.inputs.quality_mode }}" = "audio-only (فقط صوت MP3)" ]; then
            yt-dlp -f "${{ env.FORMAT }}" \
              -x --audio-format mp3 \
              --audio-quality 0 \
              --progress \
              -o "download/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          else
            yt-dlp -f "${{ env.FORMAT }}" \
              --merge-output-format mp4 \
              --progress \
              -o "download/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          fi
          
          if [ $? -ne 0 ]; then
            echo "❌ خطا در دانلود!"
            exit 1
          fi
          
          echo "✅ دانلود کامل شد!"
          
          # نمایش اطلاعات فایل
          cd download
          FILE_NAME=$(ls | head -1)
          FILE_SIZE=$(du -h "$FILE_NAME" | cut -f1)
          FILE_SIZE_MB=$(du -m "$FILE_NAME" | cut -f1)
          
          echo "DOWNLOADED_FILE=$FILE_NAME" >> $GITHUB_ENV
          echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
          echo "FILE_SIZE_MB=$FILE_SIZE_MB" >> $GITHUB_ENV
          cd ..
      
      - name: ✂️ Split file if larger than 2GB
        if: env.FILE_SIZE_MB > 2000
        run: |
          echo "⚠️ حجم فایل (${{ env.FILE_SIZE }}) از 2GB بیشتر است!"
          echo "در حال تکه‌تکه کردن فایل..."
          
          cd download
          FILE="${{ env.DOWNLOADED_FILE }}"
          BASENAME="${FILE%.*}"
          EXT="${FILE##*.}"
          
          # تقسیم به بخش‌های 1.8 گیگابایتی
          split -b 1800M "$FILE" "${BASENAME}_part_"
          
          # حذف فایل اصلی
          rm "$FILE"
          
          # ایجاد راهنما
          cat > README_SPLIT.txt << EOF
⚠️ این فایل به دلیل حجم بالا تکه‌تکه شده است.

برای ادغام در لینوکس/مک:
cat ${BASENAME}_part_* > $FILE

برای ادغام در ویندوز (CMD):
copy /b ${BASENAME}_part_* $FILE

برای ادغام در ویندوز (PowerShell):
Get-Content ${BASENAME}_part_* -AsByteStream | Set-Content $FILE -AsByteStream
EOF
          
          echo "✅ فایل به $(ls ${BASENAME}_part_* | wc -l) بخش تقسیم شد"
          cd ..
      
      - name: 📊 Create download report
        run: |
          echo "## 📥 گزارش دانلود" > report.md
          echo "" >> report.md
          echo "| آیتم | مقدار |" >> report.md
          echo "|------|-------|" >> report.md
          echo "| لینک | ${{ github.event.inputs.url }} |" >> report.md
          echo "| کیفیت | ${{ env.QUALITY_NAME }} |" >> report.md
          echo "| حجم | ${{ env.FILE_SIZE }} |" >> report.md
          echo "| تعداد فایل‌ها | $(ls download/ | wc -l) |" >> report.md
          echo "" >> report.md
          
          if [ -f download/README_SPLIT.txt ]; then
            echo "⚠️ **فایل تکه‌تکه شده است**" >> report.md
            echo "" >> report.md
            echo "### نحوه ادغام:" >> report.md
            echo '```' >> report.md
            cat download/README_SPLIT.txt >> report.md
            echo '```' >> report.md
          fi
          
          echo "### 📂 لیست فایل‌ها" >> report.md
          echo '```' >> report.md
          ls -lh download/ >> report.md
          echo '```' >> report.md
          
          cat report.md >> $GITHUB_STEP_SUMMARY
          
          # ذخیره گزارش به عنوان فایل
          cp report.md download/REPORT.md
      
      - name: 📤 Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video-${{ github.run_id }}
          path: download/
          retention-days: 7
          compression-level: 0
      
      - name: 🎉 Complete
        run: |
          echo "✅ دانلود با موفقیت انجام شد!"
          echo "📁 فایل را از بخش Artifacts دانلود کنید"
