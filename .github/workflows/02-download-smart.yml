name: ⬇️ Step 2 - Smart Download

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک یوتیوب'
        required: true
        type: string
      quality_mode:
        description: '🎯 حالت کیفیت'
        required: true
        default: 'hd-safe'
        type: choice
        options:
          - minimal (حداقل کیفیت - کمترین حجم)
          - medium (کیفیت متوسط - 480p)
          - hd-safe (720p - پیشنهادی برای گیت‌هاب)
          - hd-1080 (1080p - با تایید حجم)
          - ultra (بالاترین کیفیت موجود - با احتیاط)
          - audio-only (فقط صوت MP3)
      confirm_high_quality:
        description: '⚠️ برای کیفیت 1080p یا بالاتر، تایید کنید (yes/no)'
        required: false
        default: 'no'
        type: string

jobs:
  smart-download:
    runs-on: ubuntu-latest
    steps:
      - name: 📦 Install yt-dlp & ffmpeg
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg jq
          yt-dlp --version
      
      - name: 🎯 Set format based on quality mode
        id: set_format
        run: |
          MODE="${{ github.event.inputs.quality_mode }}"
          CONFIRM="${{ github.event.inputs.confirm_high_quality }}"
          
          case "$MODE" in
            "minimal (حداقل کیفیت - کمترین حجم)")
              FORMAT="worstvideo+worstaudio/worst"
              QUALITY_NAME="حداقل کیفیت"
              ;;
            "medium (کیفیت متوسط - 480p)")
              FORMAT="bestvideo[height<=480]+bestaudio/best"
              QUALITY_NAME="480p (متوسط)"
              ;;
            "hd-safe (720p - پیشنهادی برای گیت‌هاب)")
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              QUALITY_NAME="720p (HD - ایمن برای گیت‌هاب)"
              ;;
            "hd-1080 (1080p - با تایید حجم)")
              if [ "$CONFIRM" != "yes" ]; then
                echo "❌ برای دانلود 1080p باید تایید کنید: confirm_high_quality=yes"
                exit 1
              fi
              FORMAT="bestvideo[height<=1080]+bestaudio/best"
              QUALITY_NAME="1080p (Full HD - نیاز به بررسی حجم)"
              ;;
            "ultra (بالاترین کیفیت موجود - با احتیاط)")
              if [ "$CONFIRM" != "yes" ]; then
                echo "❌ برای دانلود بالاترین کیفیت باید تایید کنید: confirm_high_quality=yes"
                exit 1
              fi
              FORMAT="bestvideo+bestaudio/best"
              QUALITY_NAME="بالاترین کیفیت موجود (احتمالاً بیشتر از 2GB)"
              ;;
            "audio-only (فقط صوت MP3)")
              FORMAT="bestaudio/best"
              QUALITY_NAME="فقط صوت (MP3)"
              ;;
            *)
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              QUALITY_NAME="720p (پیش‌فرض)"
              ;;
          esac
          
          echo "FORMAT=$FORMAT" >> $GITHUB_ENV
          echo "QUALITY_NAME=$QUALITY_NAME" >> $GITHUB_ENV
          echo "🎯 کیفیت انتخاب شده: $QUALITY_NAME"
          echo "🔧 فرمت: $FORMAT"
      
      - name: 📊 Get video info (safe mode)
        run: |
          echo "🔍 در حال دریافت اطلاعات ویدیو..."
          
          # دریافت اطلاعات ویدیو با مدیریت خطا
          yt-dlp -j "${{ github.event.inputs.url }}" > video_info.json 2>/dev/null || echo "{}" > video_info.json
          
          # استخراج اطلاعات با مقادیر پیش‌فرض در صورت نبودن
          TITLE=$(jq -r '.title // "Unknown Title"' video_info.json 2>/dev/null)
          CHANNEL=$(jq -r '.channel // "Unknown Channel"' video_info.json 2>/dev/null)
          DURATION=$(jq -r '.duration // 0' video_info.json 2>/dev/null)
          
          # استخراج حجم تقریبی با مدیریت خطا
          FILESIZE=$(jq -r '.filesize_approx // .filesize // 0' video_info.json 2>/dev/null || echo "0")
          
          # اگر حجم صفر بود، سعی می‌کنیم از فرمت best تخمین بزنیم
          if [ "$FILESIZE" = "0" ] || [ "$FILESIZE" = "null" ]; then
            echo "حجم دقیق در دسترس نیست، در حال تخمین..."
            yt-dlp -f best -j "${{ github.event.inputs.url }}" 2>/dev/null | jq -r '.filesize_approx // .filesize // 0' > approx_size.txt 2>/dev/null || echo "0" > approx_size.txt
            FILESIZE=$(cat approx_size.txt)
          fi
          
          echo "FILE_SIZE_BYTES=$FILESIZE" >> $GITHUB_ENV
          
          if [ "$FILESIZE" != "0" ] && [ "$FILESIZE" != "null" ]; then
            FILESIZE_MB=$(echo "scale=2; $FILESIZE / 1024 / 1024" | bc 2>/dev/null || echo "0")
            FILESIZE_GB=$(echo "scale=2; $FILESIZE / 1024 / 1024 / 1024" | bc 2>/dev/null || echo "0")
            echo "FILE_SIZE_MB=$FILESIZE_MB" >> $GITHUB_ENV
            echo "FILE_SIZE_GB=$FILESIZE_GB" >> $GITHUB_ENV
            echo "📊 حجم تقریبی: ${FILESIZE_MB} MB / ${FILESIZE_GB} GB"
          else
            echo "FILE_SIZE_MB=0" >> $GITHUB_ENV
            echo "FILE_SIZE_GB=0" >> $GITHUB_ENV
            echo "⚠️ امکان محاسبه حجم دقیق وجود ندارد"
          fi
          
          echo "📺 عنوان: $TITLE"
          echo "📡 کانال: $CHANNEL"
          
          # ذخیره در environment برای مراحل بعد
          echo "VIDEO_TITLE=$TITLE" >> $GITHUB_ENV
          echo "VIDEO_CHANNEL=$CHANNEL" >> $GITHUB_ENV
      
      - name: ⚠️ Warning for large files
        if: env.FILE_SIZE_GB != 0 && env.FILE_SIZE_GB > 2
        run: |
          echo "⚠️⚠️⚠️ هشدار مهم ⚠️⚠️⚠️"
          echo "حجم تقریبی فایل: ${{ env.FILE_SIZE_GB }} GB"
          echo "محدودیت گیت‌هاب برای آپلود Artifact: 2 GB"
          echo "این فایل ممکن است قابل آپلود نباشد!"
          echo ""
          echo "پیشنهاد: کیفیت پایین‌تری انتخاب کنید"
      
      - name: ⬇️ Download video
        id: download
        run: |
          mkdir -p download
          
          echo "⬇️ شروع دانلود..."
          echo "🎯 کیفیت: ${{ env.QUALITY_NAME }}"
          echo "📺 ویدیو: ${{ env.VIDEO_TITLE }}"
          
          # ساخت نام فایل امن (بدون کاراکترهای خاص)
          SAFE_TITLE=$(echo "${{ env.VIDEO_TITLE }}" | sed 's/[^a-zA-Z0-9]/_/g' | cut -c1-50)
          
          if [ "${{ github.event.inputs.quality_mode }}" = "audio-only (فقط صوت MP3)" ]; then
            yt-dlp -f "${{ env.FORMAT }}" \
              -x --audio-format mp3 \
              --audio-quality 0 \
              --progress \
              -o "download/${SAFE_TITLE}.%(ext)s" \
              "${{ github.event.inputs.url }}"
          else
            yt-dlp -f "${{ env.FORMAT }}" \
              --merge-output-format mp4 \
              --progress \
              -o "download/${SAFE_TITLE}.%(ext)s" \
              "${{ github.event.inputs.url }}"
          fi
          
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ خطا در دانلود!"
            exit 1
          fi
          
          echo "✅ دانلود کامل شد!"
          
          # نمایش اطلاعات فایل
          cd download
          FILE_NAME=$(ls -1 2>/dev/null | head -1)
          if [ -n "$FILE_NAME" ]; then
            FILE_SIZE=$(du -h "$FILE_NAME" 2>/dev/null | cut -f1)
            FILE_SIZE_MB=$(du -m "$FILE_NAME" 2>/dev/null | cut -f1)
            echo "DOWNLOADED_FILE=$FILE_NAME" >> $GITHUB_ENV
            echo "FILE_SIZE=$FILE_SIZE" >> $GITHUB_ENV
            echo "FILE_SIZE_MB=$FILE_SIZE_MB" >> $GITHUB_ENV
            echo "📁 فایل: $FILE_NAME"
            echo "💾 حجم: $FILE_SIZE"
          else
            echo "❌ خطا: فایلی دانلود نشد!"
            ls -la
            exit 1
          fi
          cd ..
      
      - name: ✂️ Split file if larger than 2GB
        if: env.FILE_SIZE_MB != 0 && env.FILE_SIZE_MB > 2000
        run: |
          echo "⚠️ حجم فایل (${{ env.FILE_SIZE }}) از 2GB بیشتر است!"
          echo "در حال تکه‌تکه کردن فایل..."
          
          cd download
          FILE="${{ env.DOWNLOADED_FILE }}"
          BASENAME="${FILE%.*}"
          
          # تقسیم به بخش‌های 1.8 گیگابایتی
          split -b 1800M "$FILE" "${BASENAME}_part_"
          
          # حذف فایل اصلی
          rm "$FILE"
          
          # ایجاد راهنما
          cat > README_SPLIT.txt << EOF
⚠️ این فایل به دلیل حجم بالا تکه‌تکه شده است.

برای ادغام در لینوکس/مک:
cat ${BASENAME}_part_* > $FILE

برای ادغام در ویندوز (CMD):
copy /b ${BASENAME}_part_* $FILE

برای ادغام در ویندوز (PowerShell):
Get-Content ${BASENAME}_part_* -AsByteStream | Set-Content $FILE -AsByteStream
EOF
          
          echo "✅ فایل به $(ls ${BASENAME}_part_* 2>/dev/null | wc -l) بخش تقسیم شد"
          cd ..
      
      - name: 📊 Create download report
        run: |
          echo "## 📥 گزارش دانلود" > report.md
          echo "" >> report.md
          echo "| آیتم | مقدار |" >> report.md
          echo "|------|-------|" >> report.md
          echo "| لینک | ${{ github.event.inputs.url }} |" >> report.md
          echo "| عنوان | ${{ env.VIDEO_TITLE }} |" >> report.md
          echo "| کانال | ${{ env.VIDEO_CHANNEL }} |" >> report.md
          echo "| کیفیت | ${{ env.QUALITY_NAME }} |" >> report.md
          if [ -n "${{ env.FILE_SIZE }}" ]; then
            echo "| حجم | ${{ env.FILE_SIZE }} |" >> report.md
          fi
          echo "| تعداد فایل‌ها | $(ls download/ 2>/dev/null | wc -l) |" >> report.md
          echo "" >> report.md
          
          if [ -f download/README_SPLIT.txt ]; then
            echo "⚠️ **فایل تکه‌تکه شده است**" >> report.md
            echo "" >> report.md
            echo "### نحوه ادغام:" >> report.md
            echo '```' >> report.md
            cat download/README_SPLIT.txt >> report.md
            echo '```' >> report.md
          fi
          
          if [ -d download ] && [ "$(ls -A download 2>/dev/null)" ]; then
            echo "### 📂 لیست فایل‌ها" >> report.md
            echo '```' >> report.md
            ls -lh download/ 2>/dev/null >> report.md
            echo '```' >> report.md
          else
            echo "❌ **هیچ فایلی دانلود نشد!**" >> report.md
          fi
          
          cat report.md >> $GITHUB_STEP_SUMMARY
          
          # ذخیره گزارش
          mkdir -p download
          cp report.md download/REPORT.md 2>/dev/null || true
      
      - name: 📤 Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video-${{ github.run_id }}
          path: download/
          retention-days: 7
          compression-level: 0
          if-no-files-found: warn
      
      - name: 🎉 Complete
        run: |
          if [ -d download ] && [ "$(ls -A download 2>/dev/null)" ]; then
            echo "✅ دانلود با موفقیت انجام شد!"
            echo "📁 فایل را از بخش Artifacts دانلود کنید"
          else
            echo "❌ دانلود انجام نشد. لطفاً لاگ‌ها را بررسی کنید."
          fi
