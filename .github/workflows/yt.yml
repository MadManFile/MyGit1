name: 📥 YouTube Downloader - Three Methods

on:
  workflow_dispatch:  # فقط دستی اجرا بشه
    inputs:
      url:
        description: '🔗 YouTube URL (لینک ویدیو)'
        required: true
        type: string
      method:
        description: '📦 روش دانلود'
        required: true
        default: 'yt-dlp'
        type: choice
        options:
          - yt-dlp
          - pytube
          - both
      quality:
        description: '🎯 کیفیت'
        required: true
        default: 'best'
        type: choice
        options:
          - best
          - 1080
          - 720
          - audio

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          # برای yt-dlp نیاز به ffmpeg داریم
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: 🎬 Download with yt-dlp
        if: ${{ github.event.inputs.method == 'yt-dlp' || github.event.inputs.method == 'both' }}
        run: |
          python downloaders/yt_dlp_downloader.py << EOF
          ${{ github.event.inputs.url }}
          ${{ github.event.inputs.quality == 'best' && '1' || github.event.inputs.quality == '1080' && '2' || github.event.inputs.quality == '720' && '3' || '4' }}
          EOF
      
      - name: 🐍 Download with pytube
        if: ${{ github.event.inputs.method == 'pytube' || github.event.inputs.method == 'both' }}
        run: |
          python downloaders/pytube_downloader.py << EOF
          ${{ github.event.inputs.url }}
          ${{ github.event.inputs.quality == 'best' && '1' || github.event.inputs.quality == 'audio' && '3' || '2' }}
          EOF
      
      - name: 📤 Upload downloaded files
        uses: actions/upload-artifact@v4
        with:
          name: downloaded-videos-${{ github.run_id }}
          path: |
            downloads_*/
            *.mp4
            *.mp3
