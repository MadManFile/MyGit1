name: 📥 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک یوتیوب'
        required: true
        type: string
      quality:
        description: '🎯 کیفیت مورد نظر'
        required: true
        default: '720'
        type: choice
        options:
          - '144'
          - '240'
          - '360'
          - '480'
          - '720'
          - audio-only

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Install yt-dlp & ffmpeg
        run: |
          pip install --upgrade yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          yt-dlp --version
      
      - name: 🔍 Test if video is accessible
        run: |
          URL="${{ github.event.inputs.url }}"
          echo "🔍 تست دسترسی به ویدیو..."
          
          # فقط اطلاعات پایه را بدون دانلود بگیر
          yt-dlp --simulate --print "%(title)s - %(channel)s" "$URL"
          
          if [ $? -ne 0 ]; then
            echo "❌ خطا: ویدیو قابل دسترس نیست!"
            echo "ممکن است نیاز به لاگین داشته باشد یا محدودیت سنی داشته باشد."
            exit 1
          fi
      
      - name: 🎬 Download video
        run: |
          mkdir -p download
          
          QUALITY="${{ github.event.inputs.quality }}"
          URL="${{ github.event.inputs.url }}"
          
          # تنظیم فرمت
          case "$QUALITY" in
            "144")
              FORMAT="bestvideo[height<=144]+bestaudio/best"
              ;;
            "240")
              FORMAT="bestvideo[height<=240]+bestaudio/best"
              ;;
            "360")
              FORMAT="bestvideo[height<=360]+bestaudio/best"
              ;;
            "480")
              FORMAT="bestvideo[height<=480]+bestaudio/best"
              ;;
            "720")
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              ;;
            "audio-only")
              FORMAT="bestaudio/best"
              ;;
            *)
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              ;;
          esac
          
          echo "🎯 کیفیت درخواستی: $QUALITY"
          echo "🔧 فرمت جستجو: $FORMAT"
          echo "⬇️ در حال دانلود..."
          
          # گزینه‌های پایه برای پایداری بیشتر
          OPTS="--no-check-certificate --no-warnings --progress"
          
          if [ "$QUALITY" = "audio-only" ]; then
            yt-dlp $OPTS -f "$FORMAT" \
              -x --audio-format mp3 \
              -o "download/%(title)s.%(ext)s" \
              "$URL" 2>&1 | tee download.log
          else
            yt-dlp $OPTS -f "$FORMAT" \
              --merge-output-format mp4 \
              -o "download/%(title)s.%(ext)s" \
              "$URL" 2>&1 | tee download.log
          fi
          
          # بررسی موفقیت
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "❌ خطا در دانلود!"
            echo "--- آخرین خطاهای yt-dlp: ---"
            tail -20 download.log
            exit 1
          fi
          
          echo "✅ دانلود کامل شد!"
          echo "📁 فایل‌های دانلود شده:"
          ls -lh download/
      
      - name: 📤 Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: youtube-video
          path: download/
          retention-days: 7
