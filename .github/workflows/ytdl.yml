name: 📥 YouTube Downloader

on:
  workflow_dispatch:
    inputs:
      url:
        description: '🔗 لینک یوتیوب'
        required: true
        type: string
      quality:
        description: '🎯 کیفیت'
        required: true
        default: '1080p'
        type: choice
        options:
          - best (بالاترین کیفیت)
          - 2160p (4K)
          - 1440p (2K)
          - 1080p
          - 720p
          - 480p
          - 360p
          - 240p
          - 144p (حداقل کیفیت)
          - audio-only (فقط صوت)

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Install yt-dlp & ffmpeg
        run: |
          pip install yt-dlp
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          yt-dlp --version
      
      - name: 🎬 Download with Selected Quality
        run: |
          mkdir -p download
          
          case "${{ github.event.inputs.quality }}" in
            "best (بالاترین کیفیت)")
              FORMAT="bestvideo+bestaudio/best"
              ;;
            "2160p (4K)")
              FORMAT="bestvideo[height<=2160]+bestaudio/best"
              ;;
            "1440p (2K)")
              FORMAT="bestvideo[height<=1440]+bestaudio/best"
              ;;
            "1080p")
              FORMAT="bestvideo[height<=1080]+bestaudio/best"
              ;;
            "720p")
              FORMAT="bestvideo[height<=720]+bestaudio/best"
              ;;
            "480p")
              FORMAT="bestvideo[height<=480]+bestaudio/best"
              ;;
            "360p")
              FORMAT="bestvideo[height<=360]+bestaudio/best"
              ;;
            "240p")
              FORMAT="bestvideo[height<=240]+bestaudio/best"
              ;;
            "144p (حداقل کیفیت)")
              FORMAT="worstvideo+worstaudio/worst"
              ;;
            "audio-only (فقط صوت)")
              FORMAT="bestaudio/best"
              ;;
            *)
              FORMAT="bestvideo+bestaudio/best"
              ;;
          esac
          
          echo "🎯 کیفیت: ${{ github.event.inputs.quality }}"
          echo "🔧 فرمت: $FORMAT"
          
          if [ "${{ github.event.inputs.quality }}" = "audio-only (فقط صوت)" ]; then
            yt-dlp -f "$FORMAT" -x --audio-format mp3 \
              -o "download/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          else
            yt-dlp -f "$FORMAT" --merge-output-format mp4 \
              -o "download/%(title)s.%(ext)s" \
              "${{ github.event.inputs.url }}"
          fi
          
          echo "✅ دانلود کامل شد!"
          ls -lh download/
      
      - name: 📤 Upload to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: youtube-download
          path: download/
          retention-days: 7
